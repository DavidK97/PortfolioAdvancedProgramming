<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijkstra Visualisering med Prioritetskø</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0f14;
            --surface: #151820;
            --surface2: #1c2030;
            --border: #2a2f3e;
            --text: #e2e6f0;
            --muted: #6b7490;
            --accent: #4f8ef7;

            --unvisited-fill: #1a2035;
            --unvisited-stroke: #3a4560;
            --queue-fill: #2a1f00;
            --queue-stroke: #d4900a;
            --visited-fill: #001a10;
            --visited-stroke: #1a8a4a;
            --current-fill: #2a1500;
            --current-stroke: #f07030;
            --path-fill: #1a0a20;
            --path-stroke: #a060f0;

            --edge: #2a3050;
            --edge-active: #d4900a;
            --edge-path: #a060f0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px 32px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: baseline;
            gap: 16px;
        }

        header h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.04em;
        }

        header span {
            font-size: 12px;
            color: var(--muted);
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            flex: 1;
            overflow: hidden;
        }

        .graph-area {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        #graph-svg {
            width: 100%;
            flex: 1;
            background: var(--surface);
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            padding: 8px 18px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: background 0.15s, border-color 0.15s;
        }
        .btn:hover:not(:disabled) { background: #252a3a; border-color: #4a5070; }
        .btn:disabled { opacity: 0.35; cursor: default; }
        .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn.primary:hover:not(:disabled) { background: #3a7de8; }

        .step-counter {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            margin-left: auto;
        }

        .progress-bar {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.2s;
        }

        .sidebar {
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .panel {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .panel-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .msg-box {
            background: var(--surface2);
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 13px;
            line-height: 1.55;
            color: var(--text);
            min-height: 52px;
            border-left: 3px solid var(--accent);
        }

        .dist-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }
        .dist-row:last-child { border-bottom: none; }
        .dist-name { color: var(--muted); }
        .dist-val { font-family: 'JetBrains Mono', monospace; font-weight: 600; }

        /* Prioritetskø styling */
        .pq-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .pq-item {
            display: flex;
            justify-content: space-between;
            background: #2a1f00;
            border: 1px solid #d4900a;
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
        }
        .pq-empty {
            font-size: 12px;
            color: var(--muted);
            font-style: italic;
        }

        .legend {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--muted);
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid;
            flex-shrink: 0;
        }

        .log-panel {
            max-height: 200px;
            overflow-y: auto;
            padding: 16px;
            background: #090a0e;
        }
        .log-panel::-webkit-scrollbar { width: 4px; }
        .log-panel::-webkit-scrollbar-track { background: transparent; }
        .log-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .log-entry {
            font-size: 11px;
            padding: 6px 8px;
            margin-bottom: 3px;
            border-radius: 4px;
            color: var(--muted);
            border-left: 2px solid transparent;
            line-height: 1.4;
        }
        .log-entry.current {
            background: var(--surface2);
            border-left-color: var(--accent);
            color: var(--text);
        }
        .log-entry.done {
            border-left-color: #a060f0;
            color: #c090ff;
        }
    </style>
</head>
<body>

<header>
    <h1>DIJKSTRA</h1>
    <span>Helsingør → Helsinge · trin-for-trin med prioritetskø</span>
</header>

<div class="layout">
    <div class="graph-area">
        <svg id="graph-svg" viewBox="0 0 700 420">
            <defs>
                <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </marker>
            </defs>
            <g id="edges-layer"></g>
            <g id="nodes-layer"></g>
        </svg>
        <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
        <div class="controls">
            <button class="btn" id="btn-prev" onclick="step(-1)" disabled>← Forrige</button>
            <button class="btn primary" id="btn-next" onclick="step(1)">Næste →</button>
            <button class="btn" onclick="reset()">↺ Reset</button>
            <span class="step-counter" id="step-lbl">1 / 1</span>
        </div>
    </div>

    <div class="sidebar">
        <div class="panel">
            <div class="panel-title">Nuværende trin</div>
            <div class="msg-box" id="msg-box">Klik Næste for at starte.</div>
        </div>

        <div class="panel">
            <div class="panel-title">Prioritetskø (PQ / Open Set)</div>
            <div id="pq-box" class="pq-container"></div>
        </div>

        <div class="panel">
            <div class="panel-title">Afstandstabel</div>
            <div id="dist-table"></div>
        </div>

        <div class="panel">
            <div class="panel-title">Forklaring</div>
            <div class="legend">
                <div class="legend-item"><div class="legend-dot" style="background:#1a2035;border-color:#3a4560"></div>Ubesøgt</div>
                <div class="legend-item"><div class="legend-dot" style="background:#2a1f00;border-color:#d4900a"></div>I kø (PQ)</div>
                <div class="legend-item"><div class="legend-dot" style="background:#001a10;border-color:#1a8a4a"></div>Visited</div>
                <div class="legend-item"><div class="legend-dot" style="background:#2a1500;border-color:#f07030"></div>Nuværende</div>
                <div class="legend-item"><div class="legend-dot" style="background:#1a0a20;border-color:#a060f0"></div>Korteste vej</div>
            </div>
        </div>

        <div class="panel-title" style="padding:16px 16px 4px">Log</div>
        <div class="log-panel" id="log-panel"></div>
    </div>
</div>

<script>
    const NODES = {
        helsingor:   { label:"Helsingør",   x:620, y:60  },
        snekkersten: { label:"Snekkersten", x:510, y:160 },
        espergaerde: { label:"Espergærde",  x:620, y:220 },
        humlebaek:   { label:"Humlebæk",    x:510, y:300 },
        hillerod:    { label:"Hillerød",    x:290, y:210 },
        fredensborg: { label:"Fredensborg", x:400, y:310 },
        gilleleje:   { label:"Gilleleje",   x:160, y:100 },
        helsinge:    { label:"Helsinge",    x:70,  y:210 },
    };


    const EDGES = [
        {a:"helsingor",   b:"snekkersten", w:5 },
        {a:"helsingor",   b:"espergaerde", w:10},
        {a:"espergaerde", b:"humlebaek",   w:3 },
        {a:"humlebaek",   b:"fredensborg", w:2 },
        {a:"fredensborg", b:"helsinge",    w:1 },
        {a:"snekkersten", b:"hillerod",    w:7 },
        {a:"snekkersten", b:"gilleleje",   w:5 },
        {a:"hillerod",    b:"helsinge",    w:3 },
        {a:"gilleleje",   b:"hillerod",    w:1 },
    ];

    function buildAdj() {
        const adj = {};
        Object.keys(NODES).forEach(n => adj[n] = []);
        EDGES.forEach(e => {
            adj[e.a].push({node:e.b, w:e.w});
            adj[e.b].push({node:e.a, w:e.w});
        });
        return adj;
    }

    function runDijkstra(start, end) {
        const adj = buildAdj();
        const INF = 1e9;
        const dist = {}, prev = {}, visited = new Set(), inQueue = new Set();
        Object.keys(NODES).forEach(n => { dist[n]=INF; prev[n]=null; });
        dist[start] = 0;

        let pq = [[0, start]];
        inQueue.add(start);
        const snaps = [];

        // Hjælpefunktion til at kopiere og dybdesortere den nuværende kø til visualisering
        const getPqSnapshot = (queue) => {
            return [...queue]
                .sort((a, b) => a[0] - b[0])
                .map(item => ({ weight: item[0], node: item[1] }));
        };

        const snap = (msg, current, activeQueue) => snaps.push({
            dist:{...dist}, visited:new Set(visited),
            inQueue:new Set(inQueue), prev:{...prev},
            pqState: getPqSnapshot(activeQueue), // Gemmer køens præcise sortering
            current, msg, done:false, path:null
        });

        snap(`Start: ${NODES[start].label}. Afstand sættes til 0 — alle andre til ∞.`, null, pq);

        while (pq.length) {
            pq.sort((a,b)=>a[0]-b[0]);

            // Tag snapshot LIGE inden vi popper, så brugeren ser, hvem der trækkes ud
            snap(`Kigger på køen. Vælger næste element med laveste afstand.`, null, pq);

            const [d, u] = pq.shift();
            inQueue.delete(u);
            if (visited.has(u) || d > dist[u]) continue;
            visited.add(u);

            snap(`Besøger ${NODES[u].label} (${dist[u]} km). Markeres visited.`, u, pq);
            if (u === end) break;

            for (const {node:v, w} of adj[u]) {
                if (visited.has(v)) continue;
                const nd = dist[u] + w;
                if (nd < dist[v]) {
                    dist[v] = nd; prev[v] = u;
                    pq.push([nd, v]); inQueue.add(v);
                    snap(`${NODES[u].label} → ${NODES[v].label}: ${dist[u]}+${w} = ${nd} km ✓ opdaterer kø!`, u, pq);
                } else {
                    snap(`${NODES[u].label} → ${NODES[v].label}: ${dist[u]}+${w} = ${nd} km — ingen forbedring.`, u, pq);
                }
            }
        }

        const path = [];
        let s = end;
        while (s) { path.unshift(s); s = prev[s]; }
        const last = snaps[snaps.length-1];
        last.done = true; last.path = path;
        last.msg = `✓ Fundet! ${path.map(n=>NODES[n].label).join(' → ')} (${dist[end]} km)`;
        return snaps;
    }

    const STEPS = runDijkstra('helsingor','helsinge');
    let cur = 0;

    const NS = 'http://www.w3.org/2000/svg';
    function svgEl(tag, attrs) {
        const el = document.createElementNS(NS, tag);
        Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k,v));
        return el;
    }

    function getState(n, snap) {
        if (snap.done && snap.path && snap.path.includes(n)) return 'path';
        if (n === snap.current) return 'current';
        if (snap.visited.has(n)) return 'visited';
        if (snap.inQueue.has(n)) return 'inQueue';
        return 'unvisited';
    }

    const STYLES = {
        unvisited: {fill:'#1a2035', stroke:'#3a4560'},
        inQueue:   {fill:'#2a1f00', stroke:'#d4900a'},
        visited:   {fill:'#001a10', stroke:'#1a8a4a'},
        current:   {fill:'#2a1500', stroke:'#f07030'},
        path:      {fill:'#1a0a20', stroke:'#a060f0'},
    };

    function getEdgeStyle(ea, eb, snap) {
        if (snap.done && snap.path) {
            const p = snap.path;
            for (let i=0;i<p.length-1;i++)
                if((p[i]===ea&&p[i+1]===eb)||(p[i]===eb&&p[i+1]===ea))
                    return {stroke:'#a060f0', width:2.5};
        }
        if (snap.current) {
            const adj = buildAdj();
            for (const nb of adj[snap.current])
                if ((nb.node===ea&&snap.current===eb)||(nb.node===eb&&snap.current===ea))
                    return {stroke:'#d4900a', width:1.8};
        }
        return {stroke:'#2a3050', width:1};
    }

    function render() {
        const snap = STEPS[cur];
        const eLayer = document.getElementById('edges-layer');
        const nLayer = document.getElementById('nodes-layer');
        eLayer.innerHTML = ''; nLayer.innerHTML = '';

        EDGES.forEach(e => {
            const a=NODES[e.a], b=NODES[e.b];
            const es = getEdgeStyle(e.a, e.b, snap);
            const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;

            const line = svgEl('line',{x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:es.stroke,'stroke-width':es.width,'stroke-linecap':'round'});
            eLayer.appendChild(line);

            const bg = svgEl('rect',{x:mx-14,y:my-9,width:28,height:16,rx:3,fill:'#0d0f14'});
            const wt = svgEl('text',{x:mx,y:my+1,'text-anchor':'middle','dominant-baseline':'central','font-size':'10','font-family':'JetBrains Mono, monospace','font-weight':'600',fill:es.stroke});
            wt.textContent = e.w+' km';
            eLayer.appendChild(bg); eLayer.appendChild(wt);
        });

        Object.entries(NODES).forEach(([id,nd]) => {
            const state = getState(id, snap);
            const st = STYLES[state];
            const INF = 1e9;
            const dv = snap.dist[id];
            const g = svgEl('g',{});

            const c = svgEl('circle',{cx:nd.x,cy:nd.y,r:26,fill:st.fill,stroke:st.stroke,'stroke-width':'2'});
            g.appendChild(c);

            if (id === snap.current) {
                const pulse = svgEl('circle',{cx:nd.x,cy:nd.y,r:32,fill:'none',stroke:st.stroke,'stroke-width':'1',opacity:'0.4'});
                g.appendChild(pulse);
            }

            const label = svgEl('text',{x:nd.x,y:nd.y+1,'text-anchor':'middle','dominant-baseline':'central','font-size':'11','font-family':'JetBrains Mono, monospace','font-weight':'600',fill:st.stroke});
            const short = nd.label.length > 7 ? nd.label.slice(0,6)+'.' : nd.label;
            label.textContent = short;
            g.appendChild(label);

            const sub = svgEl('text',{x:nd.x,y:nd.y+38,'text-anchor':'middle','font-size':'10','font-family':'DM Sans, sans-serif',fill:'#6b7490'});
            sub.textContent = nd.label;
            g.appendChild(sub);

            const distEl = svgEl('text',{x:nd.x,y:nd.y-34,'text-anchor':'middle','font-size':'11','font-family':'JetBrains Mono, monospace','font-weight':'600',fill: dv===INF ? '#3a4560' : st.stroke});
            distEl.textContent = dv===INF ? '∞' : dv+' km';
            g.appendChild(distEl);

            nLayer.appendChild(g);
        });

        document.getElementById('msg-box').textContent = snap.msg;
        document.getElementById('msg-box').style.borderLeftColor = snap.done ? '#a060f0' : snap.current ? '#f07030' : '#4f8ef7';

        // Opretter HTML for Prioritetskøen dynamisk
        const pqBox = document.getElementById('pq-box');
        if (snap.pqState && snap.pqState.length > 0) {
            pqBox.innerHTML = snap.pqState.map(item => {
                return `<div class="pq-item">
                            <span>${NODES[item.node].label}</span>
                            <span style="color: #d4900a;">${item.weight} km</span>
                        </div>`;
            }).join('');
        } else {
            pqBox.innerHTML = '<div class="pq-empty">Køen er tom</div>';
        }

        const INF = 1e9;
        document.getElementById('dist-table').innerHTML = Object.entries(NODES).map(([id,nd]) => {
            const d = snap.dist[id], st = getState(id, snap);
            const col = st==='path'?'#a060f0':st==='current'?'#f07030':st==='visited'?'#1a8a4a':st==='inQueue'?'#d4900a':'#3a4560';
            return `<div class="dist-row"><span class="dist-name">${nd.label}</span><span class="dist-val" style="color:${col}">${d===INF?'∞':d+' km'}</span></div>`;
        }).join('');

        const log = document.getElementById('log-panel');
        log.innerHTML = STEPS.slice(0,cur+1).map((s,i) => {
            const cls = i===cur ? (s.done?'done':'current') : '';
            return `<div class="log-entry ${cls}">${s.msg}</div>`;
        }).join('');
        log.lastElementChild && log.lastElementChild.scrollIntoView({block:'nearest'});

        document.getElementById('step-lbl').textContent = `${cur+1} / ${STEPS.length}`;
        document.getElementById('progress').style.width = ((cur+1)/STEPS.length*100)+'%';
        document.getElementById('btn-prev').disabled = cur===0;
        document.getElementById('btn-next').disabled = cur===STEPS.length-1;
    }

    function step(d) { cur = Math.max(0,Math.min(STEPS.length-1,cur+d)); render(); }
    function reset() { cur=0; render(); }

    document.addEventListener('keydown', e => {
        if (e.key==='ArrowRight'||e.key==='ArrowDown') step(1);
        if (e.key==='ArrowLeft'||e.key==='ArrowUp') step(-1);
    });

    render();
</script>
</body>
</html>
